    }
}

def generateNibasApiFiles = tasks.register("generateNibasApiFiles") {
    dependsOn copyNibasApiFiles, copyNibasEventsApiFiles
}

tasks.named('clean') {
  delete generatedSrcDir
}

tasks.named('compileJava') {
  dependsOn wsImport, generateNibasApiFiles
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
  options.compilerArgs << '-Xlint:unchecked' << '-Werror'
}

tasks.withType(AbstractPublishToMaven).configureEach {
    doFirst {
        logger.lifecycle "Publishing ${publication.groupId}:${publication.artifactId}:${publication.version}"
    }
}

tasks.named('testIntegration') {
    it.systemProperties += System.properties.subMap([
        'grunnbok.mat.username',
        'grunnbok.mat.password',
        'grunnbok.tinglysing.username',
        'grunnbok.tinglysing.password',
        'landbruksregister.username',
        'landbruksregister.password',
    ])
}
manifest {
  attributes([
          'Specification-Title'   : project.name,
          'Specification-Vendor'  : 'Statens kartverk',
          'Specification-Version' : (gradle.startParameter.projectProperties.get('projectVersion') ?: projectVersion).replace('-SNAPSHOT', ''),

          //misc build info
          'Build-By'              : System.getProperty('user.name'),
          'Build-Machine'         : InetAddress.localHost.hostName,
          'Build-Repo'            : MAVEN_REPO,
          'Build-Gradle'          : gradle.gradleVersion,
          'Build-JDK'             : System.getProperty('java.version'),

          'Implementation-Title'  : "${project.name} bygget for ${(version == null || version.contains('-SNAPSHOT') || version.contains('-build')) ? 'TEST' : 'Produksjon'}",
          'Implementation-Vendor' : 'Statens kartverk',
          'Implementation-Version': project.version,
  ])
}
