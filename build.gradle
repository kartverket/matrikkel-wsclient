plugins {
    id 'java-library'
    id 'idea'
    id 'maven-publish'
    id 'sktools.xjc' version '5.7'
    id 'org.openapi.generator' version '6.0.1'
}

group = 'no.statkart.wsclient'
version = projectVersion + System.getProperty('suffix', '-SNAPSHOT')


java {
  sourceCompatibility = JavaVersion.VERSION_11
  targetCompatibility = JavaVersion.VERSION_11
}

def generatedSrcDir = file("${projectDir}/gen")
def generatedMainJavaDir = file("${generatedSrcDir}/main/java")
def WS_IMPORT_QUAL_NAME = 'com.sun.tools.ws.ant.WsImport'

def nibasDir = "${buildDir}/nibas"
def nibasSrcDir = "${nibasDir}/src/main"
def nibasJavaSources = "${nibasSrcDir}/java"
def nibasApiTmpFolder = "${nibasDir}/nibasApiTmp"
def nibasEventsApiTmpFolder = "${nibasDir}/nibasEventsApiTmp"


sourceSets {
    main {
        java {
            srcDirs generatedMainJavaDir, nibasJavaSources
        }
        xjc {
            schema {
                srcDir 'src/main/resources/byggesak/xsd'
                xjcOptions << ['p':'no.statkart.wsclient.byggesak.fiksintegrasjon.generated']
            }
        }
    }
    testIntegration {
        java {
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
        }
    }
}

configurations {
    testIntegrationImplementation.extendsFrom testImplementation
}


idea.module {
  generatedSourceDirs += generatedMainJavaDir
}

//Create the task that runs the integration tests found from the
//configured source directory and uses the correct classpath.
def testIntegration = tasks.register('testIntegration', Test) {
    group = 'verification'
    description = 'Runs the integration tests.'
    testClassesDirs = sourceSets.testIntegration.output.classesDirs
    classpath = sourceSets.testIntegration.runtimeClasspath
    outputs.upToDateWhen { false /*false ensures integration tests are run every time you invoke this task */}

    //Ensure that our unit tests are run before our integration tests
    mustRunAfter tasks.named('test')
}

tasks.withType(Test).configureEach {
    useTestNG() {
        useDefaultListeners = true
    }
}

repositories {
    maven {
        name = 'public'; url = MAVEN_REPO
    }
}

configurations {
  wsImport
  wsImportWithXJCBinding {
    extendsFrom wsImport
  }
}

dependencies {
  def jaxb2Version = '0.12.0'
  def slf4jVersion = '1.7.36'
  def jaxwsVersion = '2.3.5'
  def skifVersion = '2.10.1'

  wsImport "com.sun.xml.ws:jaxws-tools:$jaxwsVersion"

  wsImportWithXJCBinding 'org.jvnet.jaxb2_commons:jaxb2-basics-runtime:' + jaxb2Version
  wsImportWithXJCBinding 'org.jvnet.jaxb2_commons:jaxb2-basics:' + jaxb2Version
  wsImportWithXJCBinding 'org.jvnet.jaxb2_commons:jaxb2-basics-tools:' + jaxb2Version
  wsImportWithXJCBinding 'org.jvnet.jaxb2_commons:jaxb2-commons-lang:2.4'
  wsImportWithXJCBinding 'org.slf4j:slf4j-simple:' + slf4jVersion

  implementation 'com.sun.xml.ws:jaxws-rt:' + jaxwsVersion //bruker Sun/Oracle JAXWS Stack

  api 'no.statkart.skif:skif-service-common:'+skifVersion
  api 'joda-time:joda-time:2.10.1'
  implementation 'com.google.guava:guava:30.1-jre'
  implementation 'org.slf4j:slf4j-api:'+slf4jVersion
  api ('org.jvnet.jaxb2_commons:jaxb2-basics-runtime:'+jaxb2Version) {
    exclude module: 'jaxb-runtime' //disse er ekskludert da man ønsker å bruke Weblogic providede biblioteker på runtime
    exclude module: 'jaxb-api'
  }

    implementation 'org.apache.httpcomponents:httpclient:4.5.13'
    implementation 'commons-validator:commons-validator:1.7'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation(platform('com.fasterxml.jackson:jackson-bom:2.14.2')) //For å få samme versjon som matrikkelen

    testImplementation 'org.testng:testng:6.14.3'
    testImplementation 'org.assertj:assertj-core:3.23.1'
    testImplementation 'org.mockito:mockito-core:4.7.0'

    testRuntimeOnly 'org.slf4j:slf4j-simple:'+slf4jVersion

    // dependencies for koden OpenApi Generatoren genererer for Nibas API og Events API
    api 'io.swagger:swagger-annotations:1.5.22'
    implementation 'org.openapitools:jackson-databind-nullable:0.2.6'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
}

task sourceJar(type: Jar) {
  from sourceSets.main.allJava
  archiveClassifier = 'sources'
}

publishing {
  publications {
    mavenJava(MavenPublication) {
      from components.java
      artifact sourceJar

      pom.withXml {
        asNode().dependencies.dependency.findAll { it.groupId.text() == 'com.sun.xml.ws' }.each { it.appendNode('optional', 'true'); it.scope[0].value = 'provided' } //optional avhengighet for jaxws implementasjon da denne ligger som provided i appserver (weblogic)
      }
    }
  }
}

def wsImportInnsendingService = tasks.register('wsImportInnsendingService') {
  def sourceWsdl = file('src/main/resources/innsending/InnsendingServiceWS.wsdl')
  def wsGenSrc = file("${buildDir}/wsimport/innsending")
  def jaxbBindingsFile = file('src/main/resources/bindings_java_date_time_api.xml')
  inputs.file jaxbBindingsFile
  inputs.file sourceWsdl
  outputs.dir wsGenSrc

  doLast {
    ant.taskdef(name: 'wsimportInnsendingService', classname: WS_IMPORT_QUAL_NAME, classpath: configurations.wsImport.asPath)
    wsGenSrc.mkdirs()
    ant.wsimportInnsendingService(keep: true,
            sourcedestdir: wsGenSrc,
            wsdl: sourceWsdl,
            wsdlLocation: '/innsending/InnsendingServiceWS.wsdl',
            binding: jaxbBindingsFile,
            xnocompile: true,
            encoding: 'UTF-8')
  }
}

