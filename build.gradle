def wsImport = tasks.register('wsImport', Sync) {
  dependsOn processResources

  into generatedMainJavaDir
  duplicatesStrategy DuplicatesStrategy.EXCLUDE

  from wsImportInnsendingService
  from wsImportValideringService
  from wsImportStedsnavnAdressenavnInndataService
  from wsImportStedsnavnStoreService
  from wsImportStedsnavnEndringsloggService
  from wsImportStedsnavnService
  from wsImportSkrivemaateService
  from wsImportLandbruksregister
  from wsImportGrunnboksutskriftInternv2
  from wsImportGrunnbokv2
}

def inputFileNibasApi = file("src/main/resources/nibas/nibasApiV1.json").path

task generateNibasApiModel(type: org.openapitools.generator.gradle.plugin.tasks.GenerateTask) {
    generatorName = "java"
    inputSpec = inputFileNibasApi
    outputDir = nibasApiTmpFolder
    packageName = "no.kartverket.nibas.api.v1"
    apiPackage = "no.kartverket.nibas.api.v1.api"
    invokerPackage = "no.kartverket.nibas.api.v1.invoker"
    modelPackage = "no.kartverket.nibas.api.v1.model"
    configOptions = [
        library: "native",
        openApiNullable: "true",
    ]
}

def copyNibasApiFiles = tasks.register("copyNibasApiSrcFiles", Copy) {
    dependsOn {
        generateNibasApiModel
    }
    from "${nibasApiTmpFolder}/src/main/java"
    into nibasJavaSources

    doLast {
        delete "${nibasApiTmpFolder}"
    }
}

def inputFileNibasEventsApi = file("src/main/resources/nibas/nibasEventsApiV1.json").path

