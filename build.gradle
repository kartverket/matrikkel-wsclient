compileJava.dependsOn(wsImportInnsendingService)
compileJava.dependsOn(wsImportLandbruksregister)
compileJava.dependsOn(wsImportGrunnboksutskriftInternv2)
compileJava.dependsOn(wsImportGrunnbok)
compileJava.dependsOn(wsImportGrunnbokv2)

allprojects {
  tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.compilerArgs << "-Xlint:unchecked" << "-Werror"
  }
}