rootProject.name = 'matrikkel-wsclient'


gradle.beforeProject { project ->
    if (!project.hasProperty('MAVEN_REPO')) {
        project.ext.set('MAVEN_REPO', 'https://nexus.statkart.no/repository/public/')
    }
}

/**
 * Vedlikehold av wrapper via kommando. Feks:
 * gradle wrapper --gradle-version 2.12
 */
gradle.afterProject { project ->
    project.tasks.withType(Wrapper) {
        doFirst {
            // Company wide download service
            distributionUrl = uri("http://devbin.statkart.no:8070/gradle/dists/gradle-${gradleVersion}-all.zip")
            jarFile = gradle.rootProject.file('gradle/wrapper/gradle-wrapper.jar')
            scriptFile = gradle.rootProject.file('gradlew')
        }
    }
}

/*
Until Gradle 4.7, the publishing {} block was implicitly treated as if all the logic inside it was executed after the project is evaluated. This caused quite a bit of confusion, because it was the only block that behaved that way. As part of the stabilization effort in Gradle 4.8, we are deprecating this behavior and asking all users to migrate their build.
The new, stable behavior can be switched on by adding the following to your settings file: enableFeaturePreview('STABLE_PUBLISHING')
*/
if (gradle.gradleVersion >= '4.8') {
    enableFeaturePreview('STABLE_PUBLISHING')
}
