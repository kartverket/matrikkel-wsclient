name: Build and Publish

on:
    push:
        branches:
            - '**'
    workflow_dispatch:

env:
    ARTIFACT: matrikkel-status
    MAJ_VER: 5

jobs:
    calculate-version:
        name: Calculate Version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version-string.outputs.version }}
            image: ${{ steps.version-string.outputs.image }}

        steps:
            -   name: Generate version string
                id: version-string
                shell: bash
                run: |
                    version="${{ env.MAJ_VER }}.$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
                    echo "version=${version}" >> "$GITHUB_OUTPUT"
                    echo "image=ghcr.io/kartverket/matrikkel-status/${{ env.ARTIFACT }}:${version}" >> "$GITHUB_OUTPUT"

    build-and-publish:
        runs-on: ubuntu-latest
        needs: calculate-version

        permissions:
            contents: read
            packages: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Sett opp JDK 17 for x64
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    architecture: x64

            -   name: Tailscale
                uses: tailscale/github-action@v3
                with:
                    oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                    oauth-secret: ${{ secrets.TS_OAUTH_SECRET  }}
                    version: "1.48.1"
                    tags: tag:github-runner

            -   name: Valider Gradle wrapper
                uses: gradle/actions/wrapper-validation@v4

            -   name: Prepare
                run: ./gradlew clean assemble --refresh-dependencies --profile --stacktrace -Dsuffix="${{ needs.calculate-version.outputs.version }}"

            -   name: Publish to GitHub Packages
                run: ./gradlew publish --stacktrace -Dsuffix="${{ needs.calculate-version.outputs.version }}"
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
