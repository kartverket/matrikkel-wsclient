name: Bygg og prepare release
on:
  push:
    branches:
      - '**'
      - '!master'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - uses: gradle/gradle-build-action@v2
        with:
          arguments: clean assemble |
            --refresh-dependencies
            --profile
          gradle-executable: /

      - uses: gradle/gradle-build-action@v2
        with:
            arguments: check |
              --continue
            gradle-executable: /
